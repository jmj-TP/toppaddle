# Vercel Preview Deployments via GitHub Actions
# Every PR gets a preview URL; every push to main deploys to production.
# Requires these GitHub Secrets:
#   VERCEL_TOKEN     -> from vercel.com/account/tokens
#   VERCEL_ORG_ID    -> from .vercel/project.json after first `vercel` CLI link
#   VERCEL_PROJECT_ID

name: Vercel Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Deploy to Vercel (Production on main, Preview on PR)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: ${{ github.ref == 'refs/heads/main' && '--prod' || '' }}
          working-directory: ./
